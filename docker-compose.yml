version: '3.8'

services:
  embedding-api:
    build: .
    container_name: embedding_service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: always
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - http
      - embedding-api:8000
      - --domain=${NGROK_DOMAIN}
    depends_on:
      - embedding-api
